name: Feature request
description: Suggest a game or improvement
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to add?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why would this improve GameVerse?
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints
      options:
        - label: This can work without a backend server.
          required: true
        - label: This can support mobile users.
          required: true
